<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Chris Rowles" />
    <meta
      name="description"
      content="MKEditor is a simple, fast, and free online markdown editor with live preview. Write, format, and export your markdown documents instantly."
    />
    <meta
      name="keywords"
      content="markdown, markdown editor, simple markdown editor, online markdown editor, markdown writing, markdown preview, markdown formatting, markdown tool"
    />
    <!-- OpenGraph meta tags -->
    <meta property="og:title" content="MKEditor - Markdown with style." />
    <meta
      name="og:description"
      content="MKEditor is a simple, fast, and free online markdown editor with live preview. Write, format, and export your markdown documents instantly."
    />
    <meta
      property="og:image"
      content="https://versyxdigital.github.io/mkeditor/assets/img/demo-dark.png"
    />
    <!-- Twitter meta tags -->
    <meta
      name="twitter:card"
      content="https://versyxdigital.github.io/mkeditor/assets/img/demo.png"
    />
    <meta name="twitter:title" content="MKEditor - Markdown with style." />
    <meta
      name="twitter:description"
      content="Write, preview, and export markdown instantly with MKEditor."
    />
    <meta
      name="twitter:image"
      content="https://versyxdigital.github.io/mkeditor/assets/img/demo-dark.png"
    />
    <!-- Page title and canonical URL -->
    <title>MKEditor</title>
    <link rel="canonical" href="https://versyxdigital.github.io/mkeditor/web" />
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="./mkeditor.bundle.css" />
  </head>
  <body data-theme="light">
    <div
      id="splashscreen"
      class="absolute inset-0 flex items-center justify-center text-center"
    >
      <div class="w-full">
        <img src="./icon.png" class="mx-auto mb-3 w-[200px]" />
      </div>
    </div>

    <!-- React mount point. <App> renders the navbar, tab bar and the
         sidebar/workspace split inside this container. -->
    <div id="react-root" class="flex h-full flex-col"></div>

    <!-- Bottom editor toolbar shell.
         `#editor-functions` is the createPortal host for React's
         <EditorToolbar>; `#bottom-toolbar-right` is the createPortal
         host for <BottomToolbarRight> (darkmode toggle + build chip).
         The shell is fixed-bottom-positioned so it stays visible while
         the editor pane scrolls. -->
    <nav
      class="fixed bottom-0 left-0 right-0 z-10 flex items-center justify-between border-t border-border bg-background px-2 py-1"
    >
      <div class="flex items-center justify-start" id="editor-functions"></div>
      <div
        class="hidden flex-row items-center md:flex"
        id="bottom-toolbar-right"
      ></div>
    </nav>

    <script type="text/javascript" src="./mkeditor.bundle.js"></script>
  </body>
</html>
