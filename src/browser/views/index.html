<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Chris Rowles" />
    <meta
      name="description"
      content="MKEditor is a simple, fast, and free online markdown editor with live preview. Write, format, and export your markdown documents instantly."
    />
    <meta
      name="keywords"
      content="markdown, markdown editor, simple markdown editor, online markdown editor, markdown writing, markdown preview, markdown formatting, markdown tool"
    />
    <!-- OpenGraph meta tags -->
    <meta property="og:title" content="MKEditor - Markdown with style." />
    <meta
      name="og:description"
      content="MKEditor is a simple, fast, and free online markdown editor with live preview. Write, format, and export your markdown documents instantly."
    />
    <meta
      property="og:image"
      content="https://versyxdigital.github.io/mkeditor/assets/img/demo-dark.png"
    />
    <!-- Twitter meta tags -->
    <meta
      name="twitter:card"
      content="https://versyxdigital.github.io/mkeditor/assets/img/demo.png"
    />
    <meta name="twitter:title" content="MKEditor - Markdown with style." />
    <meta
      name="twitter:description"
      content="Write, preview, and export markdown instantly with MKEditor."
    />
    <meta
      name="twitter:image"
      content="https://versyxdigital.github.io/mkeditor/assets/img/demo-dark.png"
    />
    <!-- Page title and canonical URL -->
    <title>MKEditor</title>
    <link rel="canonical" href="https://versyxdigital.github.io/mkeditor/web" />
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="./mkeditor.bundle.css" />
  </head>
  <body data-theme="light">
    <div
      id="splashscreen"
      class="position-absolute top-0 bottom-0 h-100 w-100 align-items-center text-center"
    >
      <div class="w-100">
        <img src="./icon.png" class="img-fluid app-logo mb-3" />
        <h1 data-i18n-text="app:app_name">mkeditor</h1>
      </div>
    </div>

    <!-- React mount point. <App> renders the navbar, tab bar and the
         sidebar/workspace split inside this container. -->
    <div id="react-root" class="d-flex flex-column h-100"></div>

    <!-- bottom editor toolbar.
         The `#editor-functions` container is rendered by React's
         <EditorToolbar> via createPortal. `#bottom-toolbar-right` is the
         portal host for <BottomToolbarRight> (darkmode toggle + build
         chip). The <nav> shell itself stays static so Bootstrap's
         `fixed-bottom` positioning continues to apply. -->
    <nav class="navbar navbar-light bg-light fixed-bottom border-top p-2">
      <div
        class="d-flex justify-content-start align-items-center"
        id="editor-functions"
      ></div>
      <ul
        class="navbar-nav ms-auto d-none d-md-flex flex-row align-items-center"
        id="bottom-toolbar-right"
      ></ul>
    </nav>

    <script type="text/javascript" src="./mkeditor.bundle.js"></script>
  </body>
</html>
