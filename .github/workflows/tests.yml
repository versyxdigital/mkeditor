name: CI
on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run prettier-check
      - run: npm test
      # Build verification — catches webpack/tsc errors that lint and
      # unit tests miss (config drift, missing exports, broken dynamic
      # imports). build-editor bundles the renderer; build-app compiles
      # the Electron main process.
      - run: npm run build-editor
      - run: npm run build-app